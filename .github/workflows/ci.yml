name: CI

on:
  push:
    branches: [dev, test, int, uat, prd, main]
  pull_request:
    branches: [dev, main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  # Default-suite tests on stable. Ubuntu runners have e2fsprogs
  # pre-installed, so the e2fsck-acceptance tests go from skip-
  # pass on a Windows dev box to actively validating kernel-grade
  # output on every CI run.
  test:
    name: cargo test (stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Verify e2fsck on PATH (skip-pass tests will exercise it)
        run: which e2fsck && e2fsck -V 2>&1 | head -1
      - name: cargo build
        run: cargo build --workspace --all-targets
      - name: cargo test
        run: cargo test --workspace

  # MSRV gate — the workspace-pinned rust-version (1.75) must
  # actually build. Catches accidental use of newer-stdlib APIs.
  msrv:
    name: cargo check (MSRV 1.75)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.75"
      - uses: Swatinem/rust-cache@v2
        with:
          key: msrv
      - name: cargo check
        run: cargo check --workspace --all-targets

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  fmt:
    name: cargo fmt --check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
